[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn api_server.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --log-level info --access-logfile - --error-logfile -"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3